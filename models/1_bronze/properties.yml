

version: 2

models:
  - name: b_products
    description: "Raw product data with inconsistent price formats and category typos."
    columns:
      - name: product_id
        tests:
          - not_null

      - name: category
        tests:
          - not_null

      - name: product_name
      - name: price
      - name: updated_at

  - name: b_orders
    description: "Raw orders data with nulls, inconsistent statuses, and messy amount fields."

    columns:
      - name: order_id
        tests:
          - not_null

      - name: product_id
        tests:
          - relationships:
              arguments:
                to: source('raw','b_products')
                field: product_id

      - name: customer_id
      - name: order_status
      - name: order_amount
      - name: created_at
      - name: updated_at
  - name: b_payments
    description: "Raw payments data with inconsistent payment statuses and malformed amounts."
    columns:
      - name: payment_id
        tests:
          - not_null

      - name: order_id
        tests:
          - relationships:
              arguments:
                to: source('raw','b_orders')
                field: order_id

      - name: payment_status
      - name: paid_amount
      - name: processed_at

  - name: b_customers
    description: "Customer identifier (not guaranteed unique in raw layer)."
    columns:
      - name: customer_id
        tests:
          - not_null

  - name: customer_name
    description: "Raw customer name with inconsistent casing and spacing."

  - name: email
    description: "Customer email, may contain nulls, invalid formats, or duplicates."

  - name: city
    description: "Customer city with inconsistent casing."

  - name: country
    description: "Customer country with inconsistent casing."

  - name: signup_date
    description: "Date when customer signed up."

  - name: updated_at
    description: "Timestamp when record was last updated in source system."

  - name: city_country_lookup
    description: "city country lookup table generated using seed"